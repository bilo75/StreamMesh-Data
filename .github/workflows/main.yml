name: Firebase to GitHub Sync

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı otomatik çalışır
  workflow_dispatch: # Manuel olarak butona basıp çalıştırmana da izin verir

jobs:
  sync_channels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch from Firebase and Update channels.json
        run: |
          # 1. GitHub'daki mevcut channels.json'ı hazırla
          if [ -f channels.json ]; then
            cat channels.json > current.json
          else
            echo "[]" > current.json
          fi
          
          # 2. Firebase Havuzundan Yeni Eklenenleri Çek
          curl -s 'https://streammesh-p2p-default-rtdb.europe-west1.firebasedatabase.app/new_channels.json' > firebase_new.json
          
          # 3. Eğer havuz boşsa işlemi bitir (Boşa commit atma)
          if [ "$(cat firebase_new.json)" == "null" ] || [ "$(cat firebase_new.json)" == "{}" ]; then
            echo "Firebase havuzunda yeni kanal yok. Çıkış yapılıyor."
            exit 0
          fi
          
          # 4. JSON verilerini birleştir (Dictionary nesnelerinden `.value` alınarak diziye basılır)
          jq -s '.[0] + (.[1] | to_entries | map(.value) | flatten)' current.json firebase_new.json > updated.json
          
          # 5. Mükerrerleri sil. (Firebase tarafında URL engellendi, emin olmak için GitHub'da da hem ID hem Url bazlı filtreliyoruz)
          jq 'unique_by(.Url) | unique_by(.Id)' updated.json > channels.json
          
          # 6. Firebase Havuzunu Sıfırla
          curl -X DELETE 'https://streammesh-p2p-default-rtdb.europe-west1.firebasedatabase.app/new_channels.json'
          
      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Saatlik Firebase Senkronizasyonu (URL Hash Destekli)" && git push)
