- name: Commit and Push changes
        if: env.SKIP_COMMIT != 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json
          
          # 7. Sadece değişiklik varsa Commit at
          if ! git diff --staged --quiet; then
            git commit -m "Saatlik Firebase Senkronizasyonu"
            
            # PUSH ETMEDEN ÖNCE GITHUB'DAKİ YENİ DEĞİŞİKLİKLERİ ÇEK/BİRLEŞTİR (1 Hatasının Çözümü)
            git pull --rebase origin main
            
            git push
            
            # --- KRİTİK DÜZELTME BAŞLANGICI ---
            # Firebase'i YALNIZCA GitHub'a gönderim 100% başarılı olduysa temizle!
            curl -X DELETE 'https://streammesh-p2p-default-rtdb.europe-west1.firebasedatabase.app/new_channels.json'
            echo "Senkronizasyon başarılı, GitHub güncellendi ve Firebase boşaltıldı."
            # --- KRİTİK DÜZELTME BİTİŞİ ---
          else
            echo "Herhangi bir değişiklik bulunamadı, commit atlandı."
          fi
